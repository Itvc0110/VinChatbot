name: Eval (live)

# Tier-2 eval: hits live OpenRouter + Qdrant Cloud, so it runs nightly and on demand
# rather than on every push. Requires repository secrets (see PHASE0_LOG.md).

on:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC nightly
  workflow_dispatch:
    inputs:
      min_pass:
        description: "Fail the job below this overall pass rate"
        default: "0.0"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval
        env:
          VECTOR_STORE_BACKEND: qdrant
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
        run: python scripts/run_eval.py --min-pass "${{ inputs.min_pass || '0.0' }}"

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: data/eval/results/
