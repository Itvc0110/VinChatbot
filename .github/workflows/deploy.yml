name: Deploy

# Auto-deploy on every push to dholmes: SSH into the VPS, sync the branch, rebuild
# the containers. Configure these repository secrets (Settings -> Secrets -> Actions):
#   DEPLOY_HOST     - VPS IP or hostname
#   DEPLOY_USER     - SSH user (e.g. deploy or root)
#   DEPLOY_SSH_KEY  - private SSH key whose public key is in the VPS authorized_keys
#   DEPLOY_PORT     - SSH port (usually 22)
#   DEPLOY_PATH     - absolute path to the cloned repo on the VPS
on:
  push:
    branches: ["dholmes"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git reset --hard origin/dholmes
            docker compose up -d --build
            docker image prune -f
